modLoader = "klf"
loaderVersion = "[${klfVersion},)"
license = "${modLicense}"

[[mods]]
modId = "${modId}"
version = "${modVersion}"
displayName = "${modName}"
authors = "${modAuthors}"
description = '''
${modDesc}
'''
logoFile = "ecr.png"

[[dependencies.${modId}]]
modId = "neoforge"
type = "required"
versionRange = "[${neoforgeVersion},)"
ordering = "NONE"
side = "BOTH"

[[dependencies.${modId}]]
modId = "minecraft"
type = "required"
versionRange = "[${minecraftVersion},)"
ordering = "NONE"
side = "BOTH"

[[mixins]]
config = "ecr.mixins.json"

[[mixins]]
config = "ecr.api.mixins.json"
